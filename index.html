<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYQ</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <div class="main-container">

        <h1>Previous Year Question Papers</h1>
        <p class="subtitle">Select Course, Semester & Subject</p>

        <div class="input-group">
            <label for="course">Select Course</label>
            <select id="course">
                <option value="">-- Select Course --</option>
                <option value="bsc">BSc Mathematics</option>
                <!-- <option value="bscbio">BSc Bio</option> -->
                <option value="bcom">B com</option>

            </select>
        </div>

        <div class="input-group">
            <label for="semester">Select Semester</label>

            <select id="semester">
                <option value="">Select Semester</option>
            </select>

        </div>

        <div class="input-group">
            <label for="subject">Select Subject</label>
            <select id="subject">
                <option value="">Select Subject</option>
            </select>
        </div>

        <button id="showBtn">Show Papers</button>

        <div id="result"></div>
        <footer>
            <p> 2026 Designed & Developed by
                <span class="myname">Bharat Malakar</span>
            </p>
        </footer>
    </div>
    <a href="https://forms.gle/J6LYQB3UKxFbLC636" target="_blank" id="Request">
   <button>📩 Request Question Paper</button>
</a>

    <script src="script2.js"></script>
</body>
